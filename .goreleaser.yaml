version: 2

builds:
  - id: ecs-connect
    binary: ecs-connect
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: ecs-connect
    builds:
      - ecs-connect
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: ecs-connect
    ids:
      - ecs-connect
    # Homebrew defaults include linux/arm (32-bit); we only build amd64 + arm64.
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    homepage: https://github.com/vipinvkartha/ecs-connect
    description: Interactive CLI for exec-ing into running AWS ECS tasks
    repository:
      owner: vipinvkartha
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_msg_template: "brew: ecs-connect {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    test: |
      system "#{bin}/ecs-connect", "--help"
    caveats: |
      You need AWS CLI, session-manager-plugin, and ECS Exec enabled on target services.
      Config is read from ./.ecs-connect.yaml, ~/.ecs-connect.yaml, or --config.

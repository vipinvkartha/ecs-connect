# Push a version tag to publish GitHub releases and update the Homebrew tap:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Requires repo secret HOMEBREW_TAP_GITHUB_TOKEN (PAT with contents:write on
# github.com/vipinvkartha/homebrew-tap). See README → Homebrew.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
